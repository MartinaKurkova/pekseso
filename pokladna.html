---
layout: layout.njk
title: "Doprava a platba"
---

<div class="checkout__wrapper">
  <div class="checkout__container container">
    <h1 class="checkout__heading">Doprava a platba</h1>

    <div class="checkout__form-container">
      <form
        id="checkout-form"
        class="checkout__form"
        novalidate>

        <!-- Honeypot ochrana proti botům -->
        <input type="text" name="website" style="display:none" tabindex="-1" autocomplete="off">

        <!-- ===================== 1. KONTAKTNÍ ÚDAJE ===================== -->
        <section class="checkout__section">
          <h2 class="checkout__subheading">1. Kontaktní údaje</h2>

          <div class="checkout__form-group">
            <label for="email" class="checkout__label">E-mail <span aria-hidden="true">*</span></label>
            <input type="email" class="checkout__input" id="email" name="email" required placeholder="vas@email.cz">
            <div id="email-error" class="checkout__error-msg" role="alert" aria-live="polite"></div>
          </div>

          <div class="checkout__form-group">
            <label for="phone" class="checkout__label">Telefon <span aria-hidden="true">*</span></label>
            <input type="tel" class="checkout__input" id="phone" name="phone" required placeholder="+420 123 456 789">
            <div id="phone-error" class="checkout__error-msg" role="alert" aria-live="polite"></div>
          </div>
        </section>

        <!-- ===================== 2. FAKTURAČNÍ ADRESA ===================== -->
        <section class="checkout__section">
          <h2 class="checkout__subheading">2. Fakturační adresa</h2>

          <div class="form-row">
            <div class="checkout__form-group">
              <label for="billing_first_name" class="checkout__label">Jméno <span aria-hidden="true">*</span></label>
              <input type="text" class="checkout__input" id="billing_first_name" name="billing_first_name" required placeholder="Vaše jméno">
              <div id="billing_first_name-error" class="checkout__error-msg" role="alert" aria-live="polite"></div>
            </div>
            <div class="checkout__form-group">
              <label for="billing_last_name" class="checkout__label">Příjmení <span aria-hidden="true">*</span></label>
              <input type="text" class="checkout__input" id="billing_last_name" name="billing_last_name" required placeholder="Vaše příjmení">
              <div id="billing_last_name-error" class="checkout__error-msg" role="alert" aria-live="polite"></div>
            </div>
          </div>

          <div class="checkout__form-group">
            <label for="billing_street" class="checkout__label">Ulice a č.p. <span aria-hidden="true">*</span></label>
            <input type="text" class="checkout__input" id="billing_street" name="billing_street" required placeholder="Ulice a číslo popisné">
            <div id="billing_street-error" class="checkout__error-msg" role="alert" aria-live="polite"></div>
          </div>

          <div class="form-row">
            <div class="checkout__form-group">
              <label for="billing_city" class="checkout__label">Město <span aria-hidden="true">*</span></label>
              <input type="text" class="checkout__input" id="billing_city" name="billing_city" required placeholder="Vaše město/obec">
              <div id="billing_city-error" class="checkout__error-msg" role="alert" aria-live="polite"></div>
            </div>
            <div class="checkout__form-group">
              <label for="billing_zip" class="checkout__label">PSČ <span aria-hidden="true">*</span></label>
              <input type="text" class="checkout__input" id="billing_zip" name="billing_zip" required placeholder="12345" inputmode="numeric">
              <div id="billing_zip-error" class="checkout__error-msg" role="alert" aria-live="polite"></div>
            </div>
          </div>

          <!-- Dodací adresa toggle -->
          <div class="checkout__form-group checkout__form-group--checkbox">
            <input
              type="checkbox"
              id="shipping-different"
              name="shipping_different"
              class="checkout__checkbox">
            <label for="shipping-different" class="checkout__label--checkbox">
              Dodací adresa se liší od fakturační
            </label>
          </div>
        </section>

        <!-- ===================== 3. DODACÍ ADRESA (skrytá) ===================== -->
        <section class="checkout__section checkout__section--shipping" id="shipping-section" aria-hidden="true">
          <h2 class="checkout__subheading">3. Dodací adresa</h2>

          <div class="form-row">
            <div class="checkout__form-group">
              <label for="first_name" class="checkout__label">Jméno <span aria-hidden="true">*</span></label>
              <input type="text" class="checkout__input" id="first_name" name="first_name" placeholder="Vaše jméno">
              <div id="first_name-error" class="checkout__error-msg" role="alert" aria-live="polite"></div>
            </div>
            <div class="checkout__form-group">
              <label for="last_name" class="checkout__label">Příjmení <span aria-hidden="true">*</span></label>
              <input type="text" class="checkout__input" id="last_name" name="last_name" placeholder="Vaše příjmení">
              <div id="last_name-error" class="checkout__error-msg" role="alert" aria-live="polite"></div>
            </div>
          </div>

          <div class="checkout__form-group">
            <label for="street" class="checkout__label">Ulice a č.p. <span aria-hidden="true">*</span></label>
            <input type="text" class="checkout__input" id="street" name="street" placeholder="Ulice a číslo popisné">
            <div id="street-error" class="checkout__error-msg" role="alert" aria-live="polite"></div>
          </div>

          <div class="form-row">
            <div class="checkout__form-group">
              <label for="city" class="checkout__label">Město <span aria-hidden="true">*</span></label>
              <input type="text" class="checkout__input" id="city" name="city" placeholder="Vaše město/obec">
              <div id="city-error" class="checkout__error-msg" role="alert" aria-live="polite"></div>
            </div>
            <div class="checkout__form-group">
              <label for="zip" class="checkout__label">PSČ <span aria-hidden="true">*</span></label>
              <input type="text" class="checkout__input" id="zip" name="zip" placeholder="12345" inputmode="numeric">
              <div id="zip-error" class="checkout__error-msg" role="alert" aria-live="polite"></div>
            </div>
          </div>
        </section>

        <!-- ===================== 4. DOPRAVA ===================== -->
        <section class="checkout__section">
          <h2 class="checkout__subheading">4. Doprava</h2>
          <div class="checkout__shipping-options">

            <label class="shipping-card">
              <input type="radio" class="checkout__radio" name="shipping_rate" value="shr_1T6BpcJdC0N7uBdkHIPwzJUj" id="delivery-pickup">
              <span class="shipping-card__info">
                <span class="shipping-card__name">Zásilkovna: Na výdejní místo – </span>
                <span class="shipping-card__price">75 Kč</span>
                <img src="/images/icons/zasilkovna_Ikona.svg" alt="Zásilkovna" class="shipping-card__icon" height="30">
                <div id="zasilkovna-selector" style="display: none; margin-top: 10px;">
                  <button type="button" id="zasilkovna-btn" class="btn btn--small">Vybrat pobočku</button>
                  <p id="selected-branch" style="margin-top: 5px; font-weight: bold; color: #e63946;"></p>
                  <input type="hidden" id="zasilkovna-id" name="zasilkovna_id">
                  <input type="hidden" id="zasilkovna-name" name="zasilkovna_name">
                </div>
              </span>
            </label>

            <label class="shipping-card">
              <input type="radio" name="shipping_rate" value="shr_1T6BqAJdC0N7uBdkVBnfRr7E" id="delivery-home" checked>
              <span class="shipping-card__info">
                <span class="shipping-card__name">Zásilkovna: K vám domů – </span>
                <span class="shipping-card__price">99 Kč</span>
                <img src="/images/icons/zasilkovna_Ikona.svg" alt="Zásilkovna" class="shipping-card__icon" height="30">
              </span>
            </label>

            <label class="shipping-card">
              <input type="radio" name="shipping_rate" value="shr_1T6CKnJdC0N7uBdkFiXUdiFe" id="delivery-personaly">
              <span class="shipping-card__info">
                <span class="shipping-card__name">Osobní odběr v Sadské – </span>
                <span class="shipping-card__price">Zdarma</span>
                <img src="/images/icons/home.svg" alt="" class="shipping-card__icon" aria-hidden="true" height="30">
              </span>
            </label>

          </div>
          <div id="shipping-error" class="checkout__error-msg" role="alert" aria-live="polite"></div>
        </section>

        <!-- ===================== 5. PLATBA ===================== -->
        <section class="checkout__section">
          <h2 class="checkout__subheading">5. Platba</h2>
          <div class="checkout__payment-options">

            <label class="payment-card">
              <input type="radio" name="payment_method" value="card" checked>
              <span class="payment-card__info">
                <span class="payment-card__name">Platba kartou online – </span>
                <span class="payment-card__price">Zdarma</span>
                <span class="payment-card__icons">
                  <img src="/images/icons/visa.svg" alt="Visa" class="payment-card__icon" height="30">
                  <img src="/images/icons/mastercard.svg" alt="Mastercard" class="payment-card__icon" height="30">
                  <img src="/images/icons/gpay.svg" alt="Google Pay" class="payment-card__icon" height="30">
                  <img src="/images/icons/apple.svg" alt="Apple Pay" class="payment-card__icon" height="30">
                </span>
              </span>
            </label>

            <label class="payment-card">
              <input type="radio" name="payment_method" value="transfer">
              <span class="payment-card__info">
                <span class="payment-card__name">Bankovní převod – </span>
                <span class="payment-card__price">Zdarma</span>
                <img src="/images/icons/bank-01.svg" alt="" class="payment-card__icon" aria-hidden="true" height="30">
              </span>
            </label>

            <label class="payment-card" id="payment-cash-option" style="display: none;">
              <input type="radio" name="payment_method" value="cash">
              <span class="payment-card__info">
                <span class="payment-card__name">Hotově při převzetí – </span>
                <span class="payment-card__price">Zdarma</span>
                <img src="/images/icons/hotove_poz.svg" alt="" class="payment-card__icon" aria-hidden="true" height="30">
              </span>
            </label>

          </div>
          <div id="payment-error" class="checkout__error-msg" role="alert" aria-live="polite"></div>
        </section>

        <!-- ===================== 6. POZNÁMKA ===================== -->
        <section class="checkout__section">
          <h2 class="checkout__subheading">6. Poznámka k objednávce</h2>
          <div class="checkout__form-group">
            <label for="note" class="checkout__label">Poznámka <span class="checkout__label--optional">(nepovinné)</span></label>
            <textarea
              class="checkout__textarea"
              id="note"
              name="note"
              placeholder="Máte speciální přání nebo dotaz k objednávce?"
              rows="4"></textarea>
          </div>
        </section>

      </form>
    </div>

    <!-- ===================== SHRNUTÍ ===================== -->
    <section class="checkout__summary">
      <h2 class="checkout__subheading">Shrnutí objednávky</h2>

      <h3 class="checkout__title">Objednaná pexesa</h3>
      <div id="checkout__summary-items"></div>

      <h3 class="checkout__title">Zvolená doprava a platba</h3>
      <div id="checkout__summary-shipping-payment"></div>

      <h3 class="checkout__title">Celková částka k platbě</h3>
      <div class="checkout__total">
        <p class="checkout__total-price">Celkem: <span id="checkout-total-price">0</span> Kč</p>
      </div>

      <div class="checkout__form-group checkout__form-group--checkbox">
        <input
          type="checkbox"
          id="checkbox"
          class="checkout__checkbox"
          name="checkbox"
          form="checkout-form"
          required>
        <label for="checkbox">Souhlasím s <a href="/kontakt/obchodni-podminky/" target="_blank" class="checkout__link">obchodními podmínkami.</a> <span aria-hidden="true">*</span></label>
        <div id="checkbox-error" class="checkout__error-msg" role="alert" aria-live="polite"></div>
      </div>

      <button type="submit" form="checkout-form" class="checkout__submit-btn btn">
        Objednávka zavazující k platbě
      </button>
    </section>

  </div>
</div>

<script src="https://widget.packeta.com/v6/www/js/library.js"></script>
<script src="/js/checkout.js"></script>
